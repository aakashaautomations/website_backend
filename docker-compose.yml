services:
  app:
    build: .
    container_name: aakashaautomation_backend
    restart: always
    ports:
      - "4001:4001"
    env_file:
      - .env
    depends_on:
      - postgres
      # - redis

  postgres:
    image: postgres:15
    container_name: aakasha_postgres
    restart: always
    environment:
      POSTGRES_DB: aakasha_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aakasha_db_123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # redis:
  #   image: redis:7
  #   container_name: aakasha_redis
  #   restart: always

volumes:
  postgres_data:
